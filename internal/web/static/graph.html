<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gieok · provenance 그래프</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #16181d; color: #e8e8e8; }
      .panel, header { background: #1f232b; border-color: #2c313b; }
      select { background: #1f232b; color: #e8e8e8; border-color: #2c313b; }
    }
    header {
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
      padding: 12px 20px; border-bottom: 1px solid #e5e7eb; background: #fff;
    }
    h1 { margin: 0; font-size: 18px; }
    h1 a { color: inherit; text-decoration: none; }
    .nav { font-size: 13px; color: #6b7280; }
    .nav a { color: #2563eb; text-decoration: none; }
    .scope-row { display: flex; align-items: center; gap: 8px; margin-left: auto; }
    .scope-row label { font-size: 13px; color: #6b7280; white-space: nowrap; }
    select {
      padding: 8px 10px; font-size: 14px; max-width: 320px;
      border: 1px solid #d1d5db; border-radius: 8px; background: #fff; color: inherit;
    }
    main { flex: 1; display: flex; min-height: 0; }
    #cy { flex: 1; min-width: 0; }
    aside {
      width: 260px; padding: 16px 18px; border-left: 1px solid #e5e7eb;
      overflow-y: auto;
    }
    @media (prefers-color-scheme: dark) { aside { border-color: #2c313b; } }
    .panel h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.04em; color: #6b7280; margin: 0 0 8px; }
    .stat { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; }
    .stat .value { font-variant-numeric: tabular-nums; font-weight: 600; }
    #status { min-height: 18px; margin: 8px 0 0; font-size: 13px; color: #6b7280; }
    #selection { margin-top: 16px; font-size: 13px; word-break: break-word; }
    #selection .sel-text { white-space: pre-wrap; margin-top: 6px; }
    #truncated { margin-top: 12px; font-size: 12px; color: #b45309; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/">gieok</a> · provenance 그래프</h1>
    <span class="nav"><a href="/">← 검색으로</a></span>
    <div class="scope-row">
      <label for="scope">범위</label>
      <select id="scope" name="scope">
        <option value="">모든 범위</option>
      </select>
    </div>
  </header>
  <main>
    <div id="cy"></div>
    <aside>
      <div class="panel">
        <h2>집계</h2>
        <div class="stat"><span>총 원본</span><span class="value" id="stat-sources">–</span></div>
        <div class="stat"><span>총 기억</span><span class="value" id="stat-memories">–</span></div>
        <div class="stat"><span>평균 원본/기억</span><span class="value" id="stat-avg">–</span></div>
      </div>
      <div id="truncated"></div>
      <div id="status" role="status"></div>
      <div id="selection"></div>
    </aside>
  </main>

  <script src="/vendor/cytoscape.min.js"></script>
  <script>
    const scopeSelect = document.getElementById("scope");
    const statusEl = document.getElementById("status");
    const truncatedEl = document.getElementById("truncated");
    const selectionEl = document.getElementById("selection");
    const statSources = document.getElementById("stat-sources");
    const statMemories = document.getElementById("stat-memories");
    const statAvg = document.getElementById("stat-avg");

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // A node's diameter grows with its "melted-in-ness" metric (data(size)): for
    // a Memory that is its Relation degree (how many other Memories it connects
    // to), for a Source its fan-out (how many Memories melted out of it). Both
    // clamp so one huge node never crowds the canvas.
    function memorySize(size) {
      return 24 + 8 * Math.min(size || 0, 12);
    }

    function sourceSize(size) {
      return 16 + 4 * Math.min(size || 0, 12);
    }

    const cy = cytoscape({
      container: document.getElementById("cy"),
      style: [
        { selector: "node[kind='memory']", style: {
          "background-color": "#2563eb",
          "label": "data(shortLabel)",
          "color": "#fff",
          "font-size": "9px",
          "text-valign": "center",
          "text-halign": "center",
          "text-wrap": "ellipsis",
          "text-max-width": "60px",
          "width": "data(size)",
          "height": "data(size)",
        } },
        { selector: "node[kind='source']", style: {
          "background-color": "#9ca3af",
          "shape": "round-rectangle",
          "label": "data(shortLabel)",
          "font-size": "8px",
          "text-valign": "bottom",
          "text-margin-y": 3,
          "width": "data(size)",
          "height": "data(size)",
        } },
        // A Link edge (Source->Memory provenance): thin grey, directed.
        { selector: "edge[rel='link']", style: {
          "width": 1,
          "line-color": "#cbd5e1",
          "target-arrow-color": "#cbd5e1",
          "target-arrow-shape": "triangle",
          "curve-style": "bezier",
          "arrow-scale": 0.7,
        } },
        // A Relation edge (Memory<->Memory, ADR-0007): thicker, coloured, dashed
        // and undirected, so it reads as a distinct family from provenance Links.
        { selector: "edge[rel='relation']", style: {
          "width": 2.5,
          "line-color": "#8b5cf6",
          "line-style": "dashed",
          "curve-style": "bezier",
        } },
      ],
      layout: { name: "cose", animate: false },
    });

    function shortLabel(label, kind) {
      const text = String(label || "");
      const max = kind === "memory" ? 40 : 24;
      return text.length > max ? text.slice(0, max) + "…" : text;
    }

    // toElements maps a graph read-model (nodes + Link edges + Relation edges) to
    // cytoscape elements. A Memory node is sized by its Relation degree and a
    // Source node by its fan-out (both from data(size)). Link edges (Source→Memory
    // provenance) and Relation edges (Memory↔Memory) are tagged rel so the
    // stylesheet renders the two families distinctly. A scope with no Relations
    // simply adds no relation edges, degrading to the provenance-only view.
    function toElements(graph) {
      const elements = [];
      const nodeIds = new Set();
      for (const node of graph.nodes || []) {
        nodeIds.add(node.id);
        elements.push({ data: {
          id: node.id,
          kind: node.kind,
          label: node.label,
          shortLabel: shortLabel(node.label, node.kind),
          degree: node.kind === "memory" ? (node.size || 0) : 0,
          fanOut: node.kind === "source" ? (node.size || 0) : 0,
          scope: (node.scope && node.scope.value) || "",
          size: node.kind === "memory" ? memorySize(node.size) : sourceSize(node.size),
        } });
      }
      for (const edge of graph.edges || []) {
        // Guard against a Link edge referencing a capped-out node.
        if (!nodeIds.has(edge.source_id) || !nodeIds.has(edge.memory_id)) continue;
        elements.push({ data: {
          id: "e:" + edge.source_id + ":" + edge.memory_id,
          rel: "link",
          source: edge.source_id,
          target: edge.memory_id,
        } });
      }
      for (const rel of graph.relations || []) {
        // Guard against a Relation edge referencing a capped-out Memory node.
        if (!nodeIds.has(rel.from_memory_id) || !nodeIds.has(rel.to_memory_id)) continue;
        elements.push({ data: {
          id: "r:" + rel.from_memory_id + ":" + rel.to_memory_id,
          rel: "relation",
          source: rel.from_memory_id,
          target: rel.to_memory_id,
        } });
      }
      return elements;
    }

    function renderStats(stats) {
      stats = stats || {};
      statSources.textContent = stats.sources ?? 0;
      statMemories.textContent = stats.memories ?? 0;
      const avg = stats.avg_sources_per_memory || 0;
      statAvg.textContent = avg.toFixed(2);
    }

    async function loadGraph() {
      statusEl.textContent = "그래프를 불러오는 중…";
      selectionEl.innerHTML = "";
      try {
        const scope = scopeSelect.value;
        const res = await fetch(`/api/graph?scope=${encodeURIComponent(scope)}`);
        if (!res.ok) {
          statusEl.textContent = `요청 실패 (${res.status})`;
          return;
        }
        const graph = await res.json();
        renderStats(graph.stats);
        cy.elements().remove();
        cy.add(toElements(graph));
        cy.layout({ name: "cose", animate: false }).run();
        truncatedEl.textContent = graph.truncated
          ? "노드 상한을 넘어 일부만 표시합니다. 기억을 클릭해 이웃을 펼치세요."
          : "";
        const nodeCount = (graph.nodes || []).length;
        statusEl.textContent = nodeCount === 0
          ? "이 범위에는 표시할 노드가 없습니다."
          : `${nodeCount}개 노드 · 기억을 클릭하면 원본·연결 기억 이웃을 펼칩니다.`;
      } catch (err) {
        statusEl.textContent = "그래프를 불러오는 중 오류가 발생했습니다.";
      }
    }

    // expandMemory fetches a Memory's full provenance neighborhood (every Source
    // that melted into it, unrestricted by scope) and merges it into the graph,
    // so a truncated overview can be drilled down node by node.
    async function expandMemory(id) {
      try {
        const res = await fetch(`/api/graph/memory?id=${encodeURIComponent(id)}`);
        if (!res.ok) return;
        const graph = await res.json();
        const added = [];
        for (const el of toElements(graph)) {
          if (cy.getElementById(el.data.id).empty()) added.push(el);
        }
        if (added.length) {
          cy.add(added);
          cy.layout({ name: "cose", animate: false }).run();
        }
      } catch (err) {
        // A failed drilldown leaves the current graph intact.
      }
    }

    cy.on("tap", "node[kind='memory']", (event) => {
      const node = event.target;
      selectionEl.innerHTML =
        `<strong>기억</strong> ${escapeHtml(node.data("id"))}<br />` +
        `기억 ${node.data("degree")}개와 연결` +
        `<div class="sel-text">${escapeHtml(node.data("label"))}</div>`;
      expandMemory(node.data("id"));
    });

    cy.on("tap", "node[kind='source']", (event) => {
      const node = event.target;
      selectionEl.innerHTML =
        `<strong>원본</strong> ${escapeHtml(node.data("id"))}<br />` +
        `기억 ${node.data("fanOut")}개로 녹음 · 범위 ${escapeHtml(node.data("scope"))}`;
    });

    // loadScopes populates the scope selector from /api/scopes (shared with the
    // search page). A load failure leaves the all-scopes option.
    async function loadScopes() {
      try {
        const res = await fetch("/api/scopes");
        if (!res.ok) return;
        const data = await res.json();
        for (const scope of data.scopes || []) {
          const option = document.createElement("option");
          option.value = scope.value;
          option.textContent = scope.value;
          scopeSelect.appendChild(option);
        }
      } catch (err) {
        // Keep the all-scopes option so the graph still loads.
      }
    }

    scopeSelect.addEventListener("change", loadGraph);

    loadScopes().then(loadGraph);
  </script>
</body>
</html>
