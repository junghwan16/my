name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Check Go formatting
        run: |
          files="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$files" ]; then
            printf 'gofmt needed:\n%s\n' "$files"
            exit 1
          fi

      - name: Check module tidy
        run: |
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          cp go.mod go.sum "$tmp"/
          go mod tidy
          diff -u "$tmp/go.mod" go.mod
          diff -u "$tmp/go.sum" go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Run tests
        run: go test ./...

      - name: Check diff hygiene
        run: git diff --check
