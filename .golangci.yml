version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - contextcheck
    - copyloopvar
    - cyclop
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - gocritic
    - gosec
    - govet
    - ineffassign
    - intrange
    - misspell
    - nilerr
    - nilnil
    - noctx
    - nolintlint
    - prealloc
    - revive
    - rowserrcheck
    - sloglint
    - sqlclosecheck
    - staticcheck
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - whitespace
  settings:
    cyclop:
      max-complexity: 12
      package-average: 8
    errcheck:
      check-type-assertions: true
      check-blank: true
    govet:
      enable-all: true
      disable:
        - fieldalignment
    revive:
      severity: warning
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          arguments:
            # Domain types intentionally mirror the ubiquitous language (e.g.
            # memory.Memory, memory.MemoryID). See docs/design-docs/0001-memory-naming.md.
            - disableStutteringCheck
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
          disabled: true
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
    sloglint:
      no-global: all
      context: all
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - cyclop
          - gosec

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
