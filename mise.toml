[tools]
go = "1.25.10"
golangci-lint = "2.12.2"
node = "25.9.0"

[tasks.ui]
description = "Build the web UI into internal/web/static (embedded by go:embed)."
dir = "internal/web/ui"
run = "npm ci && npm run build"

[tasks.fmt]
description = "Format Go files with gofmt."
run = "find . -name '*.go' -not -path './.git/*' -not -path './.cache/*' -print0 | xargs -0 gofmt -w"

[tasks.verify]
description = "Run the local Go presubmit checks."
run = '''
set -eu

files="$(find . -name '*.go' -not -path './.git/*' -not -path './.cache/*' -print0 | xargs -0 gofmt -l)"
if [ -n "$files" ]; then
  printf 'gofmt needed:\n%s\n' "$files"
  exit 1
fi

tmp="$(mktemp -d)"
trap 'rm -rf "$tmp"' EXIT
cp go.mod go.sum "$tmp"/
go mod tidy
diff -u "$tmp/go.mod" go.mod
diff -u "$tmp/go.sum" go.sum

golangci-lint run
go test ./...

# Rebuild the committed web UI and fail if the embedded assets drift from
# source (mirrors the go mod tidy diff check above). The Go binary embeds
# internal/web/static, so it must always match internal/web/ui.
( cd internal/web/ui && npm ci && npm run build )
git diff --exit-code -- internal/web/static

git diff --check
'''
